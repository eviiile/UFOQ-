<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطأ {{ error_code }} – UFOQ</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0b0e1a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-card {
            background: rgba(20,30,48,0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .error-icon { font-size: 64px; color: #38bdf8; margin-bottom: 16px; }
        .error-code { font-size: 48px; font-weight: 900; color: #38bdf8; }
        h1 { font-size: 24px; margin: 8px 0 12px; }
        p { color: #94a3b8; line-height: 1.7; margin-bottom: 24px; }
        .btn {
            display: inline-block; padding: 12px 28px;
            background: #38bdf8; color: #0b0e1a;
            border-radius: 14px; text-decoration: none;
            font-weight: 700; transition: 0.2s;
        }
        .btn:hover { opacity: 0.85; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon"><i class="bi bi-exclamation-triangle"></i></div>
        <div class="error-code">{{ error_code }}</div>
        <h1>عذراً، حدث خطأ</h1>
        <p>{{ message }}</p>
        <a href="/" class="btn"><i class="bi bi-house-door"></i> العودة للرئيسية</a>
    </div>
</body>
</html>
